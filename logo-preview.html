<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ロゴ案</title>
  <style>
    body { background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, 'Hiragino Sans', sans-serif; display: flex; gap: 32px; padding: 48px; flex-wrap: wrap; }
    .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; width: 160px; }
    .label { font-size: 0.75rem; color: #888; letter-spacing: 0.05em; }
    .logo-row { display: flex; align-items: center; gap: 8px; }
    .app-name { font-size: 0.95rem; font-weight: 700; color: #7c6af7; }
    .card:hover { border-color: #7c6af7; }
  </style>
</head>
<body>

  <!-- A: Mモノグラム -->
  <div class="card">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#7c6af7"/>
        <path d="M6 21V8l8 9 8-9v13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="app-name">暗記</span>
    </div>
    <span class="label">A: Mモノグラム</span>
  </div>

  <!-- B: テキスト隠しライン -->
  <div class="card">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="3" y="6"  width="22" height="3" rx="1.5" fill="#7c6af7" opacity="0.35"/>
        <rect x="3" y="12.5" width="22" height="3" rx="1.5" fill="#7c6af7"/>
        <rect x="3" y="19" width="14" height="3" rx="1.5" fill="#7c6af7" opacity="0.35"/>
        <rect x="18" y="19" width="7"  height="3" rx="1.5" fill="#3d3478"/>
      </svg>
      <span class="app-name">暗記</span>
    </div>
    <span class="label">B: テキスト隠し</span>
  </div>

  <!-- C: 鍵 -->
  <div class="card">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="11" cy="11" r="6" stroke="#7c6af7" stroke-width="2"/>
        <circle cx="11" cy="11" r="2.5" fill="#7c6af7"/>
        <path d="M15.5 15.5L24 24" stroke="#7c6af7" stroke-width="2" stroke-linecap="round"/>
        <path d="M20 21l2.5-2.5" stroke="#7c6af7" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="app-name">暗記</span>
    </div>
    <span class="label">C: 鍵（記憶を開く）</span>
  </div>

  <!-- D: スパーク -->
  <div class="card">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <polygon points="14,3 17,11 26,11 19,17 22,25 14,20 6,25 9,17 2,11 11,11" fill="none" stroke="#7c6af7" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="14" cy="14" r="3" fill="#7c6af7"/>
      </svg>
      <span class="app-name">暗記</span>
    </div>
    <span class="label">D: スパーク</span>
  </div>

  <!-- E: ブック -->
  <div class="card">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M5 5h8v18H5z" stroke="#7c6af7" stroke-width="1.8" stroke-linejoin="round" fill="#3d3478" fill-opacity="0.4"/>
        <path d="M15 5h8v18h-8z" stroke="#7c6af7" stroke-width="1.8" stroke-linejoin="round" fill="#3d3478" fill-opacity="0.4"/>
        <line x1="14" y1="5" x2="14" y2="23" stroke="#7c6af7" stroke-width="1.8"/>
      </svg>
      <span class="app-name">暗記</span>
    </div>
    <span class="label">E: ブック</span>
  </div>

  <!-- F: 脳波 -->
  <div class="card">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="11" stroke="#7c6af7" stroke-width="1.8" stroke-dasharray="4 2"/>
        <path d="M7 14h2.5l2-5 3 10 2-7 1.5 2H21" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="app-name">暗記</span>
    </div>
    <span class="label">F: 脳波</span>
  </div>

</body>
</html>
